<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>内部网页服务</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 48px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .logo { font-size: 64px; margin-bottom: 16px; }
    h1 { color: #1f2937; font-size: 28px; font-weight: 600; margin-bottom: 12px; }
    .status {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 24px;
    }
    .status.unauthenticated { background: #fef3c7; color: #92400e; }
    .status.authenticated { background: #d1fae5; color: #065f46; }
    .alert {
      background: #fef3c7;
      border-left: 4px solid #f59e0b;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 32px;
      text-align: left;
    }
    .alert-text { color: #92400e; font-size: 14px; line-height: 1.6; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 32px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
    }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(59,130,246,0.4); }
    .btn-secondary { background: #f3f4f6; color: #374151; }
    .btn-secondary:hover { background: #e5e7eb; }
    .user-info {
      text-align: left;
      background: #f9fafb;
      padding: 24px;
      border-radius: 12px;
      margin-bottom: 24px;
    }
    .user-avatar { width: 64px; height: 64px; border-radius: 50%; margin-bottom: 16px; border: 3px solid #e5e7eb; }
    .user-name { font-size: 20px; font-weight: 600; color: #1f2937; margin-bottom: 8px; }
    .user-email { color: #6b7280; font-size: 14px; margin-bottom: 8px; }
    .user-id { color: #9ca3af; font-size: 12px; font-family: monospace; }
    .hidden { display: none; }
    .loading { opacity: 0.6; pointer-events: none; }
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🎉</div>
    <h1>欢迎访问内部网页服务</h1>
    <div id="unauthenticated-view">
      <span class="status unauthenticated">未认证</span>
      <div class="alert"><p class="alert-text">⚠️ 请使用飞书账号登录</p></div>
      <button id="login-btn" class="btn btn-primary">
        <span>🔐</span><span>飞书登录</span>
      </button>
    </div>
  </div>
  <script>
    async function checkAuth() {
      try {
        const res = await fetch('/api/check');
        const data = await res.json();
        
        // 已登录，检查是否有 redirect 参数
        if (data.authenticated && data.user) {
          const urlParams = new URLSearchParams(window.location.search);
          const redirectUrl = urlParams.get('redirect');
          if (redirectUrl) {
            // 有原页面路径，跳回原页面
            window.location.href = redirectUrl;
          } else {
            // 无 redirect 参数，跳转到管理页面
            window.location.href = '/pages.html';
          }
          return;
        }
        
        showUnauthenticated();
      } catch (err) {
        showUnauthenticated();
      }
    }
    function showUnauthenticated() {
      document.getElementById('unauthenticated-view').classList.remove('hidden');
      document.getElementById('authenticated-view').classList.add('hidden');
    }
    function showAuthenticated(user) {
      document.getElementById('unauthenticated-view').classList.add('hidden');
      document.getElementById('authenticated-view').classList.remove('hidden');
      document.getElementById('user-avatar').src = user.avatar || 'https://via.placeholder.com/64';
      document.getElementById('user-name').textContent = user.name;
      document.getElementById('user-email').textContent = user.email || '未提供邮箱';
      document.getElementById('user-id').textContent = 'OpenID: ' + user.open_id;
    }
    document.getElementById('login-btn').addEventListener('click', async () => {
      const btn = document.getElementById('login-btn');
      btn.classList.add('loading');
      btn.innerHTML = '<span class="spinner"></span><span>登录中...</span>';
      try {
        // 从 URL 参数获取重定向地址，或从 localStorage 获取
        const urlParams = new URLSearchParams(window.location.search);
        let redirectUrl = urlParams.get('redirect') || localStorage.getItem('login_redirect_url') || '/pages.html';
        
        const res = await fetch('/api/login-url?redirect=' + encodeURIComponent(redirectUrl));
        const data = await res.json();
        if (data.url) {
          window.location.href = data.url;
        } else {
          alert('获取登录 URL 失败');
          btn.classList.remove('loading');
          btn.innerHTML = '<span>🔐</span><span>飞书登录</span>';
        }
      } catch (err) {
        alert('登录失败：' + err.message);
        btn.classList.remove('loading');
        btn.innerHTML = '<span>🔐</span><span>飞书登录</span>';
      }
    });
    document.getElementById('logout-btn').addEventListener('click', async () => {
      try {
        await fetch('/api/logout');
        showUnauthenticated();
      } catch (err) {
        console.error('Logout failed:', err);
      }
    });
    checkAuth();
  </script>
</body>
</html>
